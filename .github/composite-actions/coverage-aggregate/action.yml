name: Aggregate coverage
description: Composes a whole-monorepo coverage total from this run's coverage plus a carried-forward baseline

inputs:
  baseline:
    description: Path to the baseline coverage-aggregate.json to carry forward unaffected packages from (may be empty)
    required: false
    default: ''

outputs:
  lines-pct:
    description: Aggregate line coverage percentage
    value: ${{ steps.aggregate.outputs.lines-pct }}
  statements-pct:
    description: Aggregate statement coverage percentage
    value: ${{ steps.aggregate.outputs.statements-pct }}
  functions-pct:
    description: Aggregate function coverage percentage
    value: ${{ steps.aggregate.outputs.functions-pct }}
  branches-pct:
    description: Aggregate branch coverage percentage
    value: ${{ steps.aggregate.outputs.branches-pct }}
  summary-path:
    description: Absolute path to the written coverage-aggregate.json
    value: ${{ steps.aggregate.outputs.summary-path }}
  fresh-count:
    description: Number of packages re-tested this run (fresh coverage)
    value: ${{ steps.aggregate.outputs.fresh-count }}
  carried-count:
    description: Number of packages carried forward from the baseline
    value: ${{ steps.aggregate.outputs.carried-count }}

runs:
  using: composite
  steps:
    - name: Compose coverage summaries
      id: aggregate
      shell: bash
      env:
        COVERAGE_BASELINE: ${{ inputs.baseline }}
      run: node "${{ github.action_path }}/aggregate.mjs"
