name: Prepare
description: Prepares the repo for a typical CI job

runs:
  using: composite
  steps:
    - name: Install pnpm package manager
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false # Don't install yet, let caching work first

    - name: Setup Node.js environment
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: package.json
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: pnpm install --ignore-scripts --frozen-lockfile

    - name: Copy env files
      shell: bash
      run: find apps -name ".env.example" -execdir cp {} .env \;

    # Export TURBO_SCM_BASE / TURBO_SCM_HEAD, so any subsequent
    # `turbo --affected` invocation diffs against the right range.
    # On a pull_request, github.sha is a temporary merge commit, so diff the PR
    # base against the PR head. On push, diff against the previous commit.
    - name: Resolve Turbo SCM range
      shell: bash
      env:
        RESOLVED_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        RESOLVED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      run: |
        set -euo pipefail

        # The first push to a branch reports an all-zero "before" SHA, and
        # workflow_dispatch has no "before" at all (empty): in both cases there
        # is no prior commit to diff against. Fall back to the git empty-tree
        # hash, which diffs every file as added and forces Turbo to treat all
        # packages as affected (i.e. run everything).
        if [[ -z "${RESOLVED_BASE}" || "${RESOLVED_BASE}" == "0000000000000000000000000000000000000000" ]]; then
          RESOLVED_BASE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
        fi

        {
          echo "TURBO_SCM_BASE=${RESOLVED_BASE}"
          echo "TURBO_SCM_HEAD=${RESOLVED_HEAD}"
        } >> "$GITHUB_ENV"
        echo "Turbo affected range: ${RESOLVED_BASE:-<none>} -> ${RESOLVED_HEAD:-HEAD}"
