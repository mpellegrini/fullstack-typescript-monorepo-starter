version: 2
updates:
  - package-ecosystem: github-actions
    directories:
      # `/` covers .github/workflows; composite actions must be listed by the
      # directory containing their action.yml.
      - /
      - /.github/composite-actions/*
    schedule:
      interval: weekly
    # One grouped PR per week instead of one PR (and one full CI run) per
    # action. Dependabot updates the pinned SHA and the trailing version
    # comment together.
    groups:
      github-actions:
        patterns: ['*']
    commit-message:
      # Match the repo's commitlint convention (subject stays lowercase:
      # "ci(github-actions): bump ...").
      prefix: ci(github-actions)
  - package-ecosystem: docker
    directories:
      - /
    schedule:
      interval: weekly
    # One grouped PR so the builder image tag and the digest-pinned distroless
    # runtime image move together instead of drifting across separate PRs.
    groups:
      docker:
        patterns: ['*']
    # Runtime is pinned to Node 24; never let Dependabot bump past it.
    ignore:
      - dependency-name: node
        versions: ['>=25']
    commit-message:
      prefix: ci(docker)
