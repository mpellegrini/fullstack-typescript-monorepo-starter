name: _compute-affected-packages

on:
  workflow_call:
    outputs:
      packages:
        description: JSON array of affected package names.
        value: ${{ jobs.compute-affected.outputs.packages }}
      paths:
        description: JSON array of affected package paths.
        value: ${{ jobs.compute-affected.outputs.paths }}
      count:
        description: Number of affected packages.
        value: ${{ jobs.compute-affected.outputs.count }}

jobs:
  compute-affected:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.affected.outputs.packages }}
      paths: ${{ steps.affected.outputs.paths }}
      count: ${{ steps.affected.outputs.count }}

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history is required, so Turborepo can diff against the base ref.
          fetch-depth: 0

      - name: Prepare
        uses: ./.github/composite-actions/prepare

      - name: Compute affected packages
        id: affected
        shell: bash
        run: |
          set -euo pipefail

          # `turbo query affected` is the supported successor to the deprecated
          # `turbo ls --affected --output=json`. It reads TURBO_SCM_BASE/HEAD from
          # the env (set by prepare). --skip-infer stops the `pnpm exec` shim
          # printing a version banner onto stdout, which would corrupt the JSON.
          #
          # The result includes the workspace root as an item named "//" with an
          # empty path; filter it out so the array holds only real packages.
          raw="$(pnpm exec turbo query affected --packages --skip-infer)"
          items='[.data.affectedPackages.items[] | select(.path != "")]'

          packages="$(echo "$raw" | jq -c "${items} | map(.name)")"
          paths="$(echo "$raw" | jq -c "${items} | map(.path)")"
          count="$(echo "$packages" | jq 'length')"

          {
            echo "packages=${packages}"
            echo "paths=${paths}"
            echo "count=${count}"
          } >> "$GITHUB_OUTPUT"

          # Human-readable run summary.
          {
            echo "### 📦 Affected packages (${count})"
            echo ""
            echo "Comparing \`${TURBO_SCM_BASE:-<auto>}\` → \`${TURBO_SCM_HEAD:-HEAD}\`"
            echo ""
            if [ "$count" -eq 0 ]; then
              echo "_No packages affected._"
            else
              echo "| Package | Path |"
              echo "| --- | --- |"
              echo "$raw" | jq -r "${items}[] | \"| \`\(.name)\` | \`\(.path)\` |\""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Affected (${count}): ${packages}"
