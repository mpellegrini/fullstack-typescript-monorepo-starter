name: Build Multi-Arch Image (push by digest to ECR)

# Builds a multi-platform image using native runners (no QEMU emulation):
#   linux/amd64 → ubuntu-latest
#   linux/arm64 → ubuntu-24.04-arm
# Both platforms build in parallel and are pushed to ECR BY DIGEST ONLY — no
# tags. Nothing is publicly addressable yet: the per-arch digests are scanned
# downstream (the gate) and only the `_ecr-publish.yml` job stitches them into a
# tagged multi-arch manifest once the scan passes. Each leg uploads its digest as
# an artifact (`digests-<platform>`) so scan + publish can resolve the bytes.

on:
  workflow_call:
    inputs:
      app_slug:
        description: 'Registry-name-safe app identifier used to namespace digest artifacts and the build cache (e.g. effect-api-server)'
        required: true
        type: string
      build_args:
        description: 'Newline-separated build args (KEY=VALUE)'
        required: false
        type: string
        default: ''
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      image_name:
        description: 'Image repository name without registry (e.g. team/service)'
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────
  # Build each platform on its native runner in parallel.
  # Images are pushed by digest (untagged) so they can be scanned, then merged
  # into a single tagged manifest later by `_ecr-publish.yml`.
  multi-platform-build:
    name: multi-platform-build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write # assume the AWS role via OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need the PR head commit (a parent of the merge ref) available
          # locally so `git show` can read its committer date for BUILD_DATE.
          fetch-depth: 2

      - name: Resolve commit SHA and build date
        id: commit-info
        uses: ./.github/composite-actions/resolve-commit-info

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # The ECR repository (with its lifecycle rules, scan config, and policies)
      # must be provisioned out-of-band via IaC — CI does NOT create it. Verify it
      # exists before doing any expensive build work, and hard-stop if it doesn't.
      - name: Verify ECR repository exists
        env:
          REPO_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            echo "::error::ECR repository '$REPO_NAME' does not exist. It must be provisioned out-of-band (IaC) with its lifecycle rules, scan config, and policies before this pipeline runs."
            exit 1
          fi
          echo "ECR repository '$REPO_NAME' exists."

      - name: Resolve ECR repository
        id: repo
        run: |
          echo "repo=${{ steps.ecr-login.outputs.registry }}/${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Labels only (no tags here). The per-arch images are pushed by their digest,
      # so the full label set gets baked into each platform's image config. The
      # 'publish' job recomputes the same metadata to tag the final manifest.
      - name: Compute labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.repo }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.commit-info.outputs.full_sha }}
            org.opencontainers.image.created=${{ steps.commit-info.outputs.build_date }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}

      - name: Sanitize platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      # Push by digest only — no tags here. The 'publish' job stitches the
      # per-platform digests into a single tagged multi-arch manifest.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            ${{ inputs.build_args }}
            VCS_REF=${{ steps.commit-info.outputs.full_sha }}
            BUILD_DATE=${{ steps.commit-info.outputs.build_date }}
            VERSION=sha-${{ steps.commit-info.outputs.full_sha }}
          outputs: type=image,name=${{ steps.repo.outputs.repo }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache stored in the app's own ECR repo under a cache-<platform>
          # tag. Unlike type=gha, ECR cache is not branch-scoped so PR and main
          # builds share the same warm layers.
          cache-from: type=registry,ref=${{ steps.repo.outputs.repo }}:cache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ steps.repo.outputs.repo }}:cache-${{ env.PLATFORM_PAIR }},mode=max,image-manifest=true,oci-mediatypes=true
          provenance: mode=max
          sbom: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ inputs.app_slug }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
