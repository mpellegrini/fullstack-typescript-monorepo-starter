name: Build and Stage to GHCR

# Builds a multi-platform image and pushes it to GHCR as an "unverified"
# staging artifact. Downstream workflows decide whether it gets promoted
# to ECR. Outputs the immutable digest so downstream jobs operate on the
# exact bytes that were built (no tag races).

on:
  workflow_call:
    inputs:
      build_args:
        description: 'Multiline build args (KEY=value per line)'
        required: false
        type: string
        default: ''
      context:
        description: 'Build context'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      image_name:
        description: 'Image name without registry (e.g. my-service)'
        required: true
        type: string
      platforms:
        description: 'Comma-separated target platforms'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      runs_on:
        description: 'Runner label'
        required: false
        type: string
        default: 'ubuntu-latest'

    outputs:
      image-digest:
        description: 'Immutable sha256 digest of the pushed manifest'
        value: ${{ jobs.build.outputs.digest }}
      image-ref:
        description: 'Pinned reference: registry/owner/name@sha256:...'
        value: ${{ jobs.build.outputs.image-ref }}
      ghcr-repo:
        description: 'GHCR repository (no tag)'
        value: ${{ jobs.build.outputs.ghcr-repo }}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless + OIDC attestations
      attestations: write # actions/attest-build-provenance
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
      ghcr-repo: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging strategy for GHCR (staging):
      #   sha-<short>          immutable, every build, the canonical handle
      #   <branch>             mutable, useful for "latest from main"
      #   pr-<n>               mutable, ephemeral PR builds
      #   unverified-<run_id>  loud signal that this hasn't passed scans yet
      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=raw,value=unverified-${{ github.run_id }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
            io.pipeline.scan-status=pending
            io.pipeline.promoted=false

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # SLSA build provenance attached to the registry image.
      # Travels with the manifest when crane copies it to ECR later.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### Built and staged to GHCR"
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Pinned ref:**"
            echo "\`\`\`"
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}@${{ steps.build.outputs.digest }}"
            echo "\`\`\`"
            echo ""
            echo "**Tags:**"
            echo "\`\`\`"
            echo "${{ steps.meta.outputs.tags }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
