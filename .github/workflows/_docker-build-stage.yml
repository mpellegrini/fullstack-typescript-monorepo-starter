# Builds a multi-platform image using native runners (no QEMU emulation):
#   linux/amd64 → ubuntu-latest
#   linux/arm64 → ubuntu-24.04-arm
# Both platforms build in parallel and are pushed to ECR BY DIGEST ONLY — no
# tags. Nothing is publicly addressable yet: the per-arch digests are scanned
# downstream (the gate) and only the `_ecr-publish.yml` job stitches them into a
# tagged multi-arch manifest once the scan passes. Each leg uploads its digest as
# an artifact (`digests-<platform>`) so scan + publish can resolve the bytes.
#
# Note: PR runs publish images for unreviewed (same-repo) branches, but under a
# distinct tag scheme (pr-<n>, pr-<n>-sha-<sha> — see _ecr-publish.yml), so they
# can never be referenced like a canonical main-built sha-<sha> image. Squash-only
# merges add a second layer: PR head SHAs never become ancestors of main, so
# release-create.yml rejects them, and ecr-cleanup.yml deletes them on PR close.

name: _docker-build-stage

on:
  workflow_call:
    inputs:
      app_slug:
        description: 'Registry-name-safe app identifier used to namespace digest artifacts and the build cache (e.g. effect-api-server)'
        required: true
        type: string
      build_args:
        description: 'Newline-separated build args (KEY=VALUE)'
        required: false
        type: string
        default: ''
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      image_name:
        description: 'Image repository name without registry (e.g. team/service)'
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────
  # Build each platform on its native runner in parallel.
  # Images are pushed by digest (untagged) so they can be scanned, then merged
  # into a single tagged manifest later by `_ecr-publish.yml`.
  multi-platform-build:
    name: multi-platform-build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write # assume the AWS role via OIDC

    steps:
      # Egress monitoring (audit): records every outbound destination this
      # OIDC-credentialed job contacts so a compromised dependency can't
      # silently exfiltrate the AWS session. Audit changes no behavior; the
      # harvested endpoint list is the input to a future egress-policy: block.
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build from the PR head commit, not the ephemeral merge ref that
          # pull_request events check out by default: the image is tagged
          # sha-<head sha> and labeled with that revision, so the bytes must
          # come from exactly that commit. Building the merge ref would claim
          # a commit the image wasn't built from, and re-running the job after
          # main moves would repoint the same sha- tag to different bytes.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # This job builds a PR-authored Dockerfile; don't leave the job's
          # GITHUB_TOKEN in .git/config where a build step could read it.
          persist-credentials: false

      - name: Resolve commit SHA and build date
        id: commit-info
        uses: ./.github/composite-actions/resolve-commit-info

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      # The ECR repository (with its lifecycle rules, scan config, and policies)
      # must be provisioned out-of-band via IaC — CI does NOT create it. Verify it
      # exists before doing any expensive build work, and hard-stop if it doesn't.
      - name: Verify ECR repository exists
        env:
          REPO_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            echo "::error::ECR repository '$REPO_NAME' does not exist. It must be provisioned out-of-band (IaC) with its lifecycle rules, scan config, and policies before this pipeline runs."
            exit 1
          fi
          echo "ECR repository '$REPO_NAME' exists."

      - name: Resolve ECR repository
        id: repo
        env:
          # Via env, not inline expansion: image_name comes from a repo-authored
          # deploy.json, so it must not reach the shell as code.
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          echo "repo=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Labels only (no tags here). The per-arch images are pushed by their digest,
      # so the full label set gets baked into each platform's image config. The
      # 'publish' job recomputes the same metadata to tag the final manifest.
      - name: Compute labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.repo.outputs.repo }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.commit-info.outputs.full_sha }}
            org.opencontainers.image.created=${{ steps.commit-info.outputs.build_date }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}

      - name: Sanitize platform name
        env:
          # Via env, not inline expansion — keeps the no-inline-interpolation
          # discipline uniform even though the matrix values are static.
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      # PR builds must not write the cache that main builds consume: an
      # unreviewed PR could otherwise seed poisoned layers that the next main
      # build — the one that publishes `latest` — would trust. PRs read their
      # own cache-pr-<n>-<platform> tag first (warm across pushes to the same
      # PR), fall back to main's cache read-only, and write only their own
      # pr-scoped tag, which ecr-cleanup.yml deletes when the PR closes. Main
      # builds keep the unscoped cache-<platform> tag, so existing cache stays
      # valid.
      - name: Resolve build cache refs
        id: cache
        env:
          REPO: ${{ steps.repo.outputs.repo }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          main_ref="${REPO}:cache-${PLATFORM_PAIR}"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            pr_ref="${REPO}:cache-pr-${PR_NUMBER}-${PLATFORM_PAIR}"
            {
              echo "cache_from<<EOF"
              echo "type=registry,ref=${pr_ref}"
              echo "type=registry,ref=${main_ref}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "cache_to=type=registry,ref=${pr_ref},mode=max,image-manifest=true,oci-mediatypes=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache_from=type=registry,ref=${main_ref}" >> "$GITHUB_OUTPUT"
            echo "cache_to=type=registry,ref=${main_ref},mode=max,image-manifest=true,oci-mediatypes=true" >> "$GITHUB_OUTPUT"
          fi

      # Push by digest only — no tags here. The 'publish' job stitches the
      # per-platform digests into a single tagged multi-arch manifest.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            ${{ inputs.build_args }}
            VCS_REF=${{ steps.commit-info.outputs.full_sha }}
            BUILD_DATE=${{ steps.commit-info.outputs.build_date }}
            VERSION=sha-${{ steps.commit-info.outputs.full_sha }}
          outputs: type=image,name=${{ steps.repo.outputs.repo }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache stored in the app's own ECR repo. Refs are computed
          # above: PR builds read pr-scoped + main cache but write only their
          # own pr-scoped tag; main builds read/write the unscoped tag.
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: mode=max
          sbom: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ inputs.app_slug }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          # Long enough that "Re-run failed jobs" still finds the digests days
          # later; the artifacts are single empty files, so cost is nil.
          retention-days: 7
