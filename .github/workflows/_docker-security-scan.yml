# =============================================================================
# Reusable Workflow: Docker Security Scan
# =============================================================================
# Vulnerability-scans an image that has already been staged to GHCR, addressing
# it by its immutable digest. Nothing is rebuilt — Trivy reads the exact bytes
# from the registry. This is the gate that decides whether an image is allowed
# to be promoted: if the gate step finds vulnerabilities at/above the
# configured severity, the job fails, and any downstream `promote` job that
# `needs:` this one is skipped.
#
# Multiple Trivy passes run intentionally:
#   1. report always uploads SARIF to the Security tab (never fails the job)
#   2. gate for each platform (amd64, arm64) vulnerability scan and misconfiguration scan
# The DB and image layers are cached after the first pass, so the others are inexpensive.
#
# Usage:
#   jobs:
#     scan:
#       uses: ./.github/workflows/_docker-security-scan.yml
#       with:
#         image_ref: ghcr.io/owner/name@sha256:...
#         severity_threshold: CRITICAL
# =============================================================================
name: Docker Security Scan

on:
  workflow_call:
    inputs:
      ignore_unfixed:
        description: 'Ignore vulnerabilities without a fix available'
        required: false
        type: boolean
        default: true
      image_ref:
        description: 'Full image ref with digest (registry/repo@sha256:...)'
        required: true
        type: string
      severity_threshold:
        description: 'Comma-separated severities that fail the build'
        required: false
        type: string
        default: 'CRITICAL'

    outputs:
      scan-passed:
        description: 'true when all blocking scans succeeded'
        value: ${{ jobs.scan.outputs.passed }}

env:
  REGISTRY: ghcr.io

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read # pull from GHCR
      security-events: write # upload SARIF to GitHub Security tab
    outputs:
      passed: ${{ steps.gate.outputs.passed }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------
      # Report pass: never fail the build, even if the scan fails,
      # just feeds the GitHub Security tab. Scans the runner's native
      # platform (linux/amd64), good enough for visibility/triage.
      # -------------------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != '' # Upload results even if the scan fails
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-container

      # -------------------------------------------------------------------
      # Severity gate (amd64): fail on configured severity threshold
      # -------------------------------------------------------------------
      - name: Fail on ${{ inputs.severity_threshold }} vulnerabilities in amd64
        id: trivy-vuln-amd64
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln'
          format: 'table'
          severity: ${{ inputs.severity_threshold }}
          exit-code: '1'
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
        env:
          TRIVY_PLATFORM: 'linux/amd64'
        continue-on-error: true

      # -------------------------------------------------------------------
      # Severity gate (arm64): fail on configured severity threshold
      # -------------------------------------------------------------------
      - name: Fail on ${{ inputs.severity_threshold }} vulnerabilities in arm64
        id: trivy-vuln-arm64
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln'
          format: 'table'
          severity: ${{ inputs.severity_threshold }}
          exit-code: '1'
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
        env:
          TRIVY_PLATFORM: 'linux/arm64'
        continue-on-error: true

      - name: Trivy misconfiguration scan (image config)
        id: trivy-config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'misconfig,secret'
          format: 'table'
          exit-code: '1'
        continue-on-error: true

      - name: Gate decision
        id: gate
        run: |
          VULN_AMD64="${{ steps.trivy-vuln-amd64.outcome }}"
          VULN_ARM64="${{ steps.trivy-vuln-arm64.outcome }}"
          CONFIG="${{ steps.trivy-config.outcome }}"

          if [[ "$VULN_AMD64" == "success" && "$VULN_ARM64" == "success" && "$CONFIG" == "success" ]]; then
            PASSED=true
          else
            PASSED=false
          fi

          icon() { [[ "$1" == "success" ]] && echo "✅ pass" || echo "❌ fail"; }

          {
            echo "### Docker security scan"
            echo ""
            echo "**Scanned image:** \`${{ inputs.image_ref }}\`"
            echo "**Severity threshold:** \`${{ inputs.severity_threshold }}\`"
            echo ""
            echo "| Scan | Result |"
            echo "| --- | --- |"
            echo "| Trivy vulnerability (amd64) | $(icon "$VULN_AMD64") |"
            echo "| Trivy vulnerability (arm64) | $(icon "$VULN_ARM64") |"
            echo "| Trivy config/secret | $(icon "$CONFIG") |"
            echo ""
            if [[ "$PASSED" == "true" ]]; then
              echo "**Gate:** ✅ passed — image is eligible for promotion"
            else
              echo "**Gate:** ❌ failed — image will NOT be promoted"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$PASSED" == "true" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Scans passed — image is eligible for promotion"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Scans failed — image will NOT be promoted"
            exit 1
          fi
