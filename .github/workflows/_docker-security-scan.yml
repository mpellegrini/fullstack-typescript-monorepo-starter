# =============================================================================
# Reusable Workflow: Docker Security Scan
# =============================================================================
# Downloads a Docker image artifact, runs Trivy and Grype vulnerability
# scanners, uploads SARIF to GitHub Security tab, and gates on severity.
#
# Usage:
#   jobs:
#     scan:
#       uses: ./.github/workflows/_docker-security-scan.yml
#       with:
#         artifact_name: docker-image
#         fail_on_severity: CRITICAL
# =============================================================================

name: Docker Security Scan

on:
  workflow_call:
    inputs:
      ignore_unfixed:
        description: 'Ignore vulnerabilities without a fix available'
        required: false
        type: boolean
        default: true
      image_ref:
        description: 'Full image ref with digest (registry/repo@sha256:...)'
        required: true
        type: string
      severity_threshold:
        description: 'Comma-separated severities that fail the build'
        required: false
        type: string
        default: 'CRITICAL'

    outputs:
      scan-passed:
        description: 'true when all blocking scans succeeded'
        value: ${{ jobs.scan.outputs.passed }}

env:
  REGISTRY: ghcr.io

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read # pull from GHCR
      security-events: write # upload SARIF to GitHub Security tab
    outputs:
      passed: ${{ steps.gate.outputs.passed }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------
      # Trivy: primary vulnerability scanner (SARIF output)
      # -------------------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != '' # Upload results even if the scan fails
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-container

      # -------------------------------------------------------------------
      # Severity gate: fail on configured threshold
      # -------------------------------------------------------------------
      - name: Fail on ${{ inputs.severity_threshold }} vulnerabilities
        id: trivy-vuln
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln'
          format: 'table'
          severity: ${{ inputs.severity_threshold }}
          exit-code: '1'
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
        continue-on-error: true

      - name: Trivy misconfiguration scan (image config)
        id: trivy-config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'misconfig,secret'
          format: 'table'
          exit-code: '1'
        continue-on-error: true

      - name: Gate decision
        id: gate
        run: |
          VULN="${{ steps.trivy-vuln.outcome }}"
          CONFIG="${{ steps.trivy-config.outcome }}"

          echo "Trivy vuln scan:    $VULN"
          echo "Trivy config/secret: $CONFIG"

          # vuln + config/secret are blocking.
          if [[ "$VULN" == "success" && "$CONFIG" == "success" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Scans passed — image is eligible for promotion"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Scans failed — image will NOT be promoted"
            exit 1
          fi
