# =============================================================================
# Reusable Workflow: Docker Security Scan
# =============================================================================
# Pulls a Docker image from GHCR by its pinned ref, runs Trivy (vuln, secret,
# and misconfig scanners), uploads SARIF to the GitHub Security tab, and gates
# the build on the configured severity threshold.
#
# Usage:
#   jobs:
#     scan:
#       uses: ./.github/workflows/_docker-security-scan.yml
#       with:
#         image_ref: ghcr.io/owner/name@sha256:...
#         severity_threshold: CRITICAL
# =============================================================================

name: Docker Security Scan

on:
  workflow_call:
    inputs:
      ignore_unfixed:
        description: 'Ignore vulnerabilities without a fix available'
        required: false
        type: boolean
        default: true
      image_ref:
        description: 'Full image ref with digest (registry/repo@sha256:...)'
        required: true
        type: string
      severity_threshold:
        description: 'Comma-separated severities that fail the build'
        required: false
        type: string
        default: 'CRITICAL'

    outputs:
      scan-passed:
        description: 'true when all blocking scans succeeded'
        value: ${{ jobs.scan.outputs.passed }}

env:
  REGISTRY: ghcr.io

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read # pull from GHCR
      security-events: write # upload SARIF to GitHub Security tab
    outputs:
      passed: ${{ steps.gate.outputs.passed }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------
      # Trivy: primary vulnerability scanner (SARIF output). trivy-action
      # caches the vulnerability DB by default (cache-dir defaults to
      # $GITHUB_WORKSPACE/.cache/trivy), so this is the only step that needs to
      # fetch/refresh it; the two gate scans below reuse it via the
      # TRIVY_SKIP_*_DB_UPDATE env vars.
      # -------------------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != '' # Upload results even if the scan fails
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-container

      # -------------------------------------------------------------------
      # Severity gate: fail on configured threshold
      # -------------------------------------------------------------------
      - name: Fail on ${{ inputs.severity_threshold }} vulnerabilities in amd64
        id: trivy-vuln-amd64
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln'
          format: 'table'
          severity: ${{ inputs.severity_threshold }}
          exit-code: '1'
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
        # DB was just fetched/cached by the SARIF scan above;
        # force reuse instead of re-downloading.
        env:
          TRIVY_PLATFORM: 'linux/amd64'
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true
        continue-on-error: true

      # -------------------------------------------------------------------
      # Severity gate: fail on configured threshold
      # -------------------------------------------------------------------
      - name: Fail on ${{ inputs.severity_threshold }} vulnerabilities in arm64
        id: trivy-vuln-arm64
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'vuln'
          format: 'table'
          severity: ${{ inputs.severity_threshold }}
          exit-code: '1'
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
        env:
          TRIVY_PLATFORM: 'linux/arm64'
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true
        continue-on-error: true

      - name: Trivy misconfiguration scan (image config)
        id: trivy-config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          scanners: 'misconfig,secret'
          format: 'table'
          exit-code: '1'
        # No vuln DB needed here, but skip the update regardless for speed.
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true
        continue-on-error: true

      - name: Gate decision
        id: gate
        run: |
          VULN_AMD64="${{ steps.trivy-vuln-amd64.outcome }}"
          VULN_ARM64="${{ steps.trivy-vuln-arm64.outcome }}"
          CONFIG="${{ steps.trivy-config.outcome }}"

          echo "Trivy vuln scan on amd64:    $VULN_AMD64"
          echo "Trivy vuln scan on arm64:    $VULN_ARM64"
          echo "Trivy config/secret:         $CONFIG"

          # vuln + config/secret are blocking.
          if [[ "$VULN_AMD64" == "success" && "$VULN_ARM64" == "success" && "$CONFIG" == "success" ]]; then
            PASSED=true
          else
            PASSED=false
          fi

          icon() { [[ "$1" == "success" ]] && echo "✅ pass" || echo "❌ fail"; }

          {
            echo "### Docker security scan"
            echo ""
            echo "| Scan | Result |"
            echo "| --- | --- |"
            echo "| Trivy vuln (amd64) | $(icon "$VULN_AMD64") |"
            echo "| Trivy vuln (arm64) | $(icon "$VULN_ARM64") |"
            echo "| Trivy config/secret | $(icon "$CONFIG") |"
            echo ""
            if [[ "$PASSED" == "true" ]]; then
              echo "**Gate:** ✅ passed — image is eligible for promotion"
            else
              echo "**Gate:** ❌ failed — image will NOT be promoted"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$PASSED" == "true" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Scans passed — image is eligible for promotion"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Scans failed — image will NOT be promoted"
            exit 1
          fi
