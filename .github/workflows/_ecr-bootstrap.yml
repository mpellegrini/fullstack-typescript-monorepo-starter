# =============================================================================
# Reusable Workflow: Bootstrap ephemeral AWS environment
# =============================================================================
# Stands up the AWS-side prerequisites before an image is built. Right now the
# only real resource it provisions is the ECR repository (create-if-missing);
# the rest of the per-PR ephemeral environment (compute, networking, DNS, …) is
# a PLACEHOLDER until the IaC approach (CDK / Terraform / …) is chosen.
#
# Auth uses GitHub OIDC — no long-lived AWS keys. Required repo variables:
#   vars.AWS_REGION         e.g. us-east-1
#   vars.AWS_GHA_ROLE_ARN   IAM role this repo's OIDC token may assume
# =============================================================================
name: Bootstrap ECR / Ephemeral Env

on:
  workflow_call:
    inputs:
      image_name:
        description: 'ECR repository name to ensure exists (e.g. team/service)'
        required: true
        type: string

    outputs:
      repo:
        description: 'Fully qualified ECR repository (registry/image_name, no tag)'
        value: ${{ jobs.bootstrap.outputs.repo }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # assume the AWS role via OIDC
    outputs:
      repo: ${{ steps.ensure-repo.outputs.repo }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        id: ensure-repo
        env:
          REPO_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail
          if aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            echo "ECR repository '$REPO_NAME' already exists."
          else
            echo "Creating ECR repository '$REPO_NAME'..."
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-tag-mutability MUTABLE \
              --image-scanning-configuration scanOnPush=false >/dev/null
          fi
          echo "repo=${{ steps.ecr-login.outputs.registry }}/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      # ───────────────────────────────────────────────────────────────────
      # PLACEHOLDER: stand up the rest of the ephemeral environment (compute,
      # networking, DNS, secrets, …) once the IaC approach is chosen. Until
      # then this is intentionally a no-op so the pipeline shape is stable.
      # ───────────────────────────────────────────────────────────────────
      - name: Provision ephemeral environment (placeholder)
        run: |
          echo "::notice::Ephemeral environment provisioning is a placeholder — no compute stood up yet."
