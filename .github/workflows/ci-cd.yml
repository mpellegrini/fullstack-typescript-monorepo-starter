name: ci-cd

on:
  workflow_dispatch: # This enables the manual execution button
    inputs:
      reason:
        description: 'Reason for running this manually'
        required: false
        default: 'Routine check'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags-ignore: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default-deny at the workflow root; jobs that need more elevate per job.
permissions: {}

jobs:
  # ─────────────────────────────────────────────
  code-quality:
    permissions:
      contents: read
    uses: ./.github/workflows/_code-quality.yml

  # ─────────────────────────────────────────────
  compute-affected:
    permissions:
      contents: read
    uses: ./.github/workflows/_compute-affected-packages.yml

  # ─────────────────────────────────────────────
  # Compute the deployable apps from the set of affected packages.
  deploy-matrix:
    needs: [code-quality, compute-affected]
    permissions:
      contents: read
    uses: ./.github/workflows/_compute-deployable-apps.yml
    with:
      paths: ${{ needs.compute-affected.outputs.paths }}

  # ─────────────────────────────────────────────
  # Build both arches on native runners and push to ECR by digest (untagged).
  # The build stage verifies the target ECR repository already exists (provisioned
  # out-of-band via IaC) and hard-stops if it doesn't.
  docker-build:
    needs: [deploy-matrix]
    if: needs.deploy-matrix.outputs.has_apps == 'true'
    name: docker-build (${{ matrix.target.app_name }})
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.deploy-matrix.outputs.apps) }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_docker-build-stage.yml
    with:
      app_slug: ${{ matrix.target.app_name }}
      build_args: |
        APP_NAME=${{ matrix.target.app_name }}
      image_name: ${{ matrix.target.image_name }}

  # Trivy gate: scan each app's per-arch digests. Failure skips that app's publish.
  docker-scan:
    needs: [deploy-matrix, docker-build]
    if: needs.deploy-matrix.outputs.has_apps == 'true'
    name: docker-scan (${{ matrix.target.app_name }})
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.deploy-matrix.outputs.apps) }}
    permissions:
      contents: read
      id-token: write
      security-events: write
    uses: ./.github/workflows/_docker-security-scan.yml
    with:
      app_slug: ${{ matrix.target.app_name }}
      image_name: ${{ matrix.target.image_name }}

  # Only reached when the gate passes: tag the multi-arch manifest and attest.
  docker-publish:
    needs: [deploy-matrix, docker-scan]
    if: needs.deploy-matrix.outputs.has_apps == 'true' && needs.docker-scan.result == 'success'
    name: docker-publish (${{ matrix.target.app_name }})
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.deploy-matrix.outputs.apps) }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_ecr-publish.yml
    with:
      app_slug: ${{ matrix.target.app_name }}
      image_name: ${{ matrix.target.image_name }}

  # ─────────────────────────────────────────────
  # Single aggregate status check. Configure branch protection to require ONLY
  # this job: it rolls up every upstream result, so conditionally-skipped jobs
  # never block a merge while genuine failures and cancellations still do.
  ci-passed:
    if: always() # Ensures this job ALWAYS runs to report status
    needs:
      [compute-affected, code-quality, deploy-matrix, docker-build, docker-scan, docker-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify upstream jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed (skipped jobs are allowed)."
