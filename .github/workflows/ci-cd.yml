name: ci-cd

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags-ignore: ['**']

# Cancel superseded runs on the same ref (e.g. new pushes to a PR)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Computes the affected packages once, up front. Exposes a JSON array
  # (needs.affected.outputs.packages) for any downstream job to consume.
  affected:
    uses: ./.github/workflows/_affected.yml

  # ─────────────────────────────────────────────
  code-quality:
    uses: ./.github/workflows/_code-quality.yml

  # ─────────────────────────────────────────────
  docker-build:
    needs: [code-quality, affected]
    # Only build the image when its app (or one of its deps) is affected.
    # if: contains(fromJSON(needs.affected.outputs.packages), '@apps/effect-api-server')
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/_docker-build-stage.yml
    with:
      build_args: |
        APP_NAME=effect-api-server
      image_name: flight-res/flight-res-mgmt-shop

  scan:
    needs: docker-build
    permissions:
      contents: read
      packages: read # pull from GHCR
      security-events: write # upload SARIF to GitHub Security tab
    uses: ./.github/workflows/_docker-security-scan.yml
    with:
      image_ref: ${{ needs.docker-build.outputs.image_ref }}
