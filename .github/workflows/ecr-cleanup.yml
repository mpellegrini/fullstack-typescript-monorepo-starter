# =============================================================================
# ECR Cleanup: prune a PR's images when it closes
# =============================================================================
# When a PR is merged OR closed without merging, delete the images that PR's
# pipeline published to ECR. The set of image repositories is discovered from
# the base branch by reading every app's `deploy.json` imageName (the same opt-in
# marker ci-cd uses), so this scales automatically as apps are added. For each
# repo we delete:
#   - the mutable pr-<n> tag
#   - the PR's per-arch build cache tags (cache-pr-<n>-<platform>)
#   - the immutable sha-<full> tag for every commit that was in the PR
#
# Deleting the tagged multi-arch manifests leaves their per-arch child layers
# and attestation referrers untagged. Those are NOT deleted here on purpose:
# an untagged child can still be referenced by another tagged manifest (e.g.
# `latest`, or another open PR built from the same bytes), so a naive untagged
# sweep would corrupt a live image. Reaping orphaned untagged manifests is left
# to an ECR lifecycle policy (tagStatus=untagged, sinceImagePushed>N days) —
# see the plan's follow-ups.
#
# Auth uses GitHub OIDC. Required repo variables: vars.AWS_REGION,
# vars.AWS_GHA_ROLE_ARN. Fork PRs never receive OIDC (and so never pushed
# images), so the job is skipped for them.
#
# pull_request_target, not pull_request: deleting images needs the trusted
# role (ecr:BatchDeleteImage — deliberately NOT granted to the PR role), and a
# plain pull_request run executes the PR branch's copy of this workflow with a
# pull_request OIDC sub that the trusted role's trust policy rejects.
# pull_request_target runs the base branch's copy with sub=ref:refs/heads/main,
# so the delete capability is only ever exercised by reviewed workflow code.
# Safe here because no PR-controlled code is executed: we check out the BASE
# branch and only consume PR metadata (number, commit SHAs) via the API, passed
# as data. Keep it that way — never check out or run the PR head in this file.
# See .github/docs/aws-oidc-roles.md.
# =============================================================================

name: ecr-cleanup

# Deliberate pull_request_target (see header): runs the base branch's reviewed
# workflow code so the delete-capable trusted role is never exposed to a PR's
# copy of this file. Safe because no PR-controlled code executes — base-branch
# checkout only, PR metadata consumed as data via the API.
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # assume the AWS role via OIDC
      pull-requests: read # list the PR's commits via the API

    steps:
      # Read deploy targets from the base branch — it always exists, even after
      # the PR branch is deleted on merge.
      - name: Check out base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete the PR's ECR images
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # pr-<n> is always a candidate, as are the PR's per-arch build cache
          # tags (the platform list mirrors the build matrix in
          # _docker-build-stage.yml); then one sha-<full> per PR commit.
          # The commits API returns the full 40-char SHA, matching the publish tag.
          image_ids=( "imageTag=pr-${PR_NUMBER}" )
          for platform_pair in linux-amd64 linux-arm64; do
            image_ids+=( "imageTag=cache-pr-${PR_NUMBER}-${platform_pair}" )
          done
          while read -r sha; do
            [ -n "$sha" ] && image_ids+=( "imageTag=sha-${sha}" )
          done < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits" --jq '.[].sha')

          # Discover every deployable app's ECR repo from its deploy.json opt-in
          # marker — the same `imageName` field _compute-deployable-apps.yml reads
          # to build the deploy matrix. Scans all apps (not just the PR's affected
          # set) so any repo this PR may have published to is covered.
          mapfile -t repos < <(for cfg in apps/*/deploy.json; do
            [ -f "$cfg" ] && jq -r '.imageName // empty' "$cfg"
          done | sort -u)

          {
            echo "### ECR cleanup for PR #${PR_NUMBER}"
            echo ""
            echo "Candidate tags: \`$(printf '%s ' "${image_ids[@]}")\`"
          } >> "$GITHUB_STEP_SUMMARY"

          for repo in "${repos[@]}"; do
            echo "::group::Pruning ${repo}"
            # batch-delete-image tolerates tags that don't exist (reported under
            # .failures) and deletes up to 100 ids per call; chunk to stay safe.
            # A missing repository is not an error here — skip it.
            if ! aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              echo "Repository ${repo} does not exist — skipping."
              echo "::endgroup::"
              continue
            fi
            deleted='[]'
            for ((i = 0; i < ${#image_ids[@]}; i += 100)); do
              result="$(aws ecr batch-delete-image \
                --repository-name "$repo" \
                --image-ids "${image_ids[@]:i:100}" \
                --output json)"
              deleted="$(jq -c --argjson r "$result" '. + ($r.imageIds // [])' <<< "$deleted")"
            done
            {
              echo ""
              echo "**\`${repo}\`** — deleted:"
              jq -r 'if length == 0 then "- _(nothing matched)_" else .[] | "- " + (.imageTag // .imageDigest) end' <<< "$deleted"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
          done
