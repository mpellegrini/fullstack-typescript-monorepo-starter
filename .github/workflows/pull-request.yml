# Runs the full quality gate on every pull request.
# Images are pushed to ECR with pr-<number> and sha-<hash> tags.

name: Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  code-quality:
    uses: ./.github/workflows/_code-quality.yml

  # ─────────────────────────────────────────────
  build:
    needs: code-quality
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/_docker-build-stage.yml
    with:
      image_name: flight-res/flight-res-mgmt-shop
      build_args: |
        APP_NAME=flight-res-mgmt-shop
