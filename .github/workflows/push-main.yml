# Runs the full quality gate on every push to main (i.e. merged pull request).

name: Push Main

on:
  push:
    branches: [main]
    tags-ignore: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  code-quality:
    uses: ./.github/workflows/_code-quality.yml

  # ─────────────────────────────────────────────
  build:
    needs: code-quality
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/_docker-build-stage.yml
    with:
      image_name: flight-res/flight-res-mgmt-shop
      build_args: |
        APP_NAME=effect-api-server
