name: zz-diag-release-token
on:
  push:
    branches: [diag/release-token]
permissions: {}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Mint app token (identical to release-create)
        id: t
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
      - name: A) curl DRAFT
        env: { TOKEN: "${{ steps.t.outputs.token }}", REPO: "${{ github.repository }}" }
        run: |
          set -uo pipefail
          code=$(curl -sS -o /tmp/a.json -w '%{http_code}' -X POST -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/releases" -d '{"tag_name":"zz-a-'"$RANDOM"'","draft":true}')
          echo "A curl draft: HTTP $code"
          id=$(jq -r '.id // empty' /tmp/a.json); [ -n "$id" ] && curl -sS -X DELETE -H "Authorization: token $TOKEN" "https://api.github.com/repos/$REPO/releases/$id" >/dev/null && echo "  cleaned"
      - name: B) gh release create DRAFT
        env: { GH_TOKEN: "${{ steps.t.outputs.token }}", REPO: "${{ github.repository }}" }
        run: |
          set -uo pipefail
          T="zz-b-$RANDOM"
          gh release create "$T" --repo "$REPO" --draft --title diag --notes diag && echo "B gh draft: OK" || echo "B gh draft: FAILED"
          gh release delete "$T" --repo "$REPO" --yes 2>/dev/null && echo "  cleaned" || true
      - name: C) gh release create PUBLISHED (exactly like release-create)
        env: { GH_TOKEN: "${{ steps.t.outputs.token }}", REPO: "${{ github.repository }}" }
        run: |
          set -uo pipefail
          T="zz-c-$RANDOM"
          SHA=$(git ls-remote "https://github.com/$REPO" HEAD | cut -f1)
          gh release create "$T" --repo "$REPO" --target "$SHA" --title diag --notes diag && echo "C gh published: OK" || echo "C gh published: FAILED"
          gh release delete "$T" --repo "$REPO" --cleanup-tag --yes 2>/dev/null && echo "  cleaned" || true
