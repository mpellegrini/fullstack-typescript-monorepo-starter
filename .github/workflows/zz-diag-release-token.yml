name: zz-diag-release-token
on:
  push:
    branches: [diag/release-token]
permissions:
  contents: write
  id-token: write
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - name: Mint app token
        id: t
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
      - name: F) EXACT release-create shape (@v tag, --prerelease, big notes)
        env: { GH_TOKEN: "${{ steps.t.outputs.token }}" }
        run: |
          set -uo pipefail
          SHA=$(git rev-parse HEAD)
          NOTES=$(git log "$SHA" --pretty='- %s (%h)' -- "apps/" "packages/")
          echo "notes bytes: ${#NOTES}"
          gh release create "zzdiag@v0.0.99" --target "$SHA" --title "zzdiag v0.0.99" --notes "$NOTES" --prerelease \
            && echo "F: OK" || echo "F: FAILED"
          gh release delete "zzdiag@v0.0.99" --cleanup-tag --yes 2>/dev/null && echo "  cleaned" || true
