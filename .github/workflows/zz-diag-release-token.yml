name: zz-diag-release-token
on:
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - name: Mint app token (identical to release-create)
        id: t
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
      - name: Inspect + attempt release (workflow_dispatch context)
        env: { TOKEN: "${{ steps.t.outputs.token }}", GH_TOKEN: "${{ steps.t.outputs.token }}", REPO: "${{ github.repository }}" }
        run: |
          set -uo pipefail
          echo "event: $GITHUB_EVENT_NAME"
          echo "repositories input would be: ${{ github.event.repository.name }}"
          echo "token length: ${#TOKEN}"
          echo "== curl draft =="
          curl -sS -o /tmp/d.json -w 'curl draft HTTP %{http_code}\n' -X POST -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/releases" -d '{"tag_name":"zzwfd-'"$RANDOM"'","draft":true}'
          jq '{message}' /tmp/d.json
          id=$(jq -r '.id // empty' /tmp/d.json); [ -n "$id" ] && curl -sS -X DELETE -H "Authorization: token $TOKEN" "https://api.github.com/repos/$REPO/releases/$id" >/dev/null
          echo "== gh published (like release-create) =="
          SHA=$(git rev-parse HEAD)
          gh release create "effect-api-server@v0.0.97-diag" --target "$SHA" --title diag --notes diag --prerelease && echo "gh: OK" || echo "gh: FAILED"
          gh release delete "effect-api-server@v0.0.97-diag" --cleanup-tag --yes 2>/dev/null || true
