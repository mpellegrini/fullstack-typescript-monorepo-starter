#  Only explicitly listed packages can run install scripts. This is a strong mitigation
#  against malicious postinstall scripts in transitive deps.
allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  msgpackr-extract: false
  msw: false
  protobufjs: false
  unrs-resolver: false

#  Blocks packages with non-standard dependency specifiers
#  (e.g., git://, file:, http:// deps in transitive dependencies). This is one of the most
#  impactful supply chain controls available — it closes a common vector where malicious packages
#  pull in arbitrary code via unusual specifiers.
blockExoticSubdeps: true

engineStrict: true

#  Requires packages to have been published for at least 72 hours before they can be installed.
#  This mitigates "fast-follow" attacks where a typosquat or hijacked package is published and
#  immediately pulled in before the community detects it.
minimumReleaseAge: 4320 # 72 hours

# Single source of truth for the Effect 4.0 beta line: workspaces declare
# `catalog:effect4`, so bumping a beta is a one-line edit here — package.json
# and one-version.config.json (which keys its override on the literal
# `catalog:effect4` string) stay untouched.
catalogs:
  effect4:
    '@effect/platform-node': 4.0.0-beta.93
    effect: 4.0.0-beta.93

packages:
  - 'apps/*'
  - 'packages/*'
  - 'toolchain/*'

publicHoistPattern:
  - 'typescript' # @toolchain/typescript-config
  - 'eslint' # @toolchain/eslint-config
  - 'vitest' # @toolchain/vitest-config
  - '@vitest/coverage-v8' # @toolchain/vitest-config

savePrefix: ''
saveWorkspaceProtocol: 'rolling'

#  Prevents packages from being installed at a version lower than what's in the lockfile.
#  Defends against dependency confusion and rollback attacks where an attacker publishes
#  a lower-versioned malicious package.
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'chokidar@4.0.3'
  - 'semver@6.3.1'
  # Bare names (no version) exclude every version: pnpm only accepts exact
  # versions here (no ranges), so this is the only way to track the Effect 4.0
  # betas without editing this list on each release. Rollback protection is off
  # for these three packages only — re-pin to exact versions once 4.0.0 stable lands.
  - 'effect'
  - '@effect/platform-node'
  - '@effect/platform-node-shared'
  - 'tailwind-merge@2.6.1'
